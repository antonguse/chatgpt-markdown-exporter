<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Debug MVP</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <input id="urlInput" type="url" placeholder="https://chatgpt.com/s/xxxxx" />
      <div class="controls">
        <button id="convertButton" type="button">Convert</button>
        <label><input id="debugToggle" type="checkbox" /> Debug</label>
        <label>Mode
          <select id="markdownMode">
            <option value="compact" selected>compact</option>
            <option value="chat">chat</option>
          </select>
        </label>
      </div>
      <div id="status">Status: idle</div>
      <div class="outputControls">
        <button id="copyButton" type="button">Copy</button>
      </div>
      <textarea id="markdownOutput" readonly></textarea>
      <textarea id="debugOutput" readonly hidden></textarea>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
